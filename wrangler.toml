# Cloudflare Pages — MaiContact
# Este archivo configura el proyecto para Cloudflare Pages con Pages Functions.
#
# Deploy: conectar el repo a Cloudflare Pages (Dashboard → Workers & Pages → Create)
# Las Pages Functions en functions/ se despliegan automáticamente con cada push.
# NO usar wrangler deploy — usar git push al branch conectado a Cloudflare Pages.

name = "maicontact"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "dist"

[build]
command = "npm run build"

# ── Variables de entorno ────────────────────────────────────────────────────
# Las variables VITE_* se configuran en:
#   Cloudflare Pages → Settings → Environment Variables → Production
#
# Las variables server-side (sin VITE_) se configuran como SECRETS en:
#   Cloudflare Pages → Settings → Environment Variables → Production (Encrypted)
#
# NUNCA agregar SUPABASE_SERVICE_ROLE_KEY aquí como texto plano.
#
# Variables requeridas en Cloudflare Pages:
#
# CLIENT (VITE_*):
#   VITE_SUPABASE_URL            = https://xxxx.supabase.co
#   VITE_SUPABASE_ANON_KEY       = eyJhbGci...
#   VITE_APP_NAME                = MaiContact
#   VITE_APP_ENV                 = production
#
# SERVER (Pages Functions — solo en el Worker, nunca en el bundle cliente):
#   SUPABASE_URL                 = https://xxxx.supabase.co   (mismo que VITE_)
#   SUPABASE_ANON_KEY            = eyJhbGci...                (mismo que VITE_)
#   SUPABASE_SERVICE_ROLE_KEY    = eyJhbGci...                (⚠️  SECRET — rol de servicio)
